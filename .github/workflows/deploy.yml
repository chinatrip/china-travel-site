name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  # Allow wiki repo to trigger rebuild via repository_dispatch
  repository_dispatch:
    types: [wiki-updated]
  # Manual trigger
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Sync wiki content
        run: npm run sync-content

      - name: Build site
        run: npm run build

