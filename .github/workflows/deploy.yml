name: Sync wiki content and deploy

on:
  # Triggered by wiki repo when audited content changes
  repository_dispatch:
    types: [wiki-updated]
  # Manual trigger
  workflow_dispatch:

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.WIKI_REPO_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Sync wiki content
        run: npm run sync-content
        env:
          GITHUB_TOKEN: ${{ secrets.WIKI_REPO_TOKEN }}

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet src/content/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated content
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/
          git commit -m "Auto-sync: update content from wiki repo"
          git push
